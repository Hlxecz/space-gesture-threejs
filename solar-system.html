<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 입자 태양계 - MediaPipe 인터랙티브 홀로그램</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #03030c;
            font-family: 'Outfit', sans-serif;
            color: #e0e0ff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #input-video {
            display: none;
        }

        /* Glassmorphic Cyber HUD */
        #hud-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hud-panel {
            background: rgba(5, 5, 20, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 255, 255, 0.05);
            max-width: 340px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.15rem;
            margin: 0 0 6px 0;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #8899af;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .control-guide {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            font-size: 0.85rem;
        }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .guide-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            filter: drop-shadow(0 0 4px rgba(0, 255, 255, 0.4));
        }

        .guide-text {
            color: #c0cddf;
            line-height: 1.4;
        }

        /* Bottom Planet Info Panel */
        #planet-info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translate(-50%, 30px);
            z-index: 10;
            width: 90%;
            max-width: 520px;
            background: rgba(5, 5, 20, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 16px;
            padding: 20px 26px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6),
                inset 0 0 15px rgba(0, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
        }

        #planet-info-panel.visible {
            opacity: 1;
            transform: translate(-50%, 0);
            pointer-events: auto;
        }

        #planet-info-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            color: #00ffff;
            margin: 0 0 8px 0;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #planet-info-panel h2::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 14px;
            background: #00ffff;
            box-shadow: 0 0 8px #00ffff;
            border-radius: 2px;
        }

        #planet-info-panel p {
            font-size: 0.88rem;
            color: #c0cddf;
            margin: 0 0 12px 0;
            line-height: 1.6;
        }

        .info-stats {
            font-size: 0.8rem;
            color: #88a8ff;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 10px;
            letter-spacing: 0.5px;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: space-between;
            opacity: 0.85;
        }

        #loading-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            letter-spacing: 3px;
            line-height: 1.8;
            background: rgba(3, 3, 12, 0.85);
            padding: 25px 45px;
            border-radius: 16px;
            border: 1px dashed rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        #loading-msg small {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            color: #88a8ff;
            letter-spacing: 0;
        }

        /* Active Status Indicator */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00ffaa;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ffaa;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div id="hud-container">
        <div class="hud-panel">
            <h1>Solar Hologram v2.0</h1>
            <div class="subtitle">
                <span class="status-dot"></span>MediaPipe 모션 트래킹 활성화됨
            </div>
            <div class="control-guide">
                <div class="guide-item">
                    <span class="guide-icon">✊</span>
                    <span class="guide-text"><strong>주먹 쥐기</strong><br>궤도 정지 및 태양계 회전 드래그</span>
                </div>
                <div class="guide-item">
                    <span class="guide-icon">🖐️</span>
                    <span class="guide-text"><strong>손바닥 펴기</strong><br>행성 입자 폭발 및 손으로 끌어당김</span>
                </div>
                <div class="guide-item">
                    <span class="guide-icon">✌️</span>
                    <span class="guide-text"><strong>손가락 벌리기</strong><br>태양계 전체 줌인 / 줌아웃 (엄지-검지)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Subtitle Panel for Planet Info -->
    <div id="planet-info-panel">
        <h2 id="info-planet-name">행성 이름</h2>
        <p id="info-planet-desc">행성 정보</p>
        <div id="info-planet-stats" class="info-stats">행성 스펙</div>
    </div>

    <div id="loading-msg">태양계 홀로그램 부팅 중...<br><small>카메라(웹캠) 권한을 허용해 주세요</small></div>
    <video id="input-video" playsinline></video>

    <script>
        let scene, camera, renderer, stars;
        let solarSystemGroup;
        let sunObj;
        let planets = [];
        let handGroup, handSkeleton, handPoints;
        let lastHandPos = null;
        let currentHandCenter = new THREE.Vector3(0, 0, 0);
        let isExploded = false;
        let isFrozen = false;
        let explosionFactor = 0;
        let shakeIntensity = 0;

        // 태양계 데이터 정의 (수성 ~ 토성) 및 설명글
        const sunData = {
            radius: 3.5,
            color: 0xff4400,
            particleCount: 4000,
            particleSize: 0.05,
            displayName: '태양 (The Sun)',
            desc: '태양계 중심에 위치한 항성으로, 전체 질량의 99.8%를 차지합니다. 거대하게 꿈틀거리는 붉은 가스 입자와 에너지가 우주 전역으로 뿜어져 나옵니다.',
            stats: '크기: 지구의 약 109배 | 표면 온도: 약 5,500 °C'
        };

        const planetsData = [
            {
                name: '수성 (Mercury)',
                radius: 0.6,
                color: 0x8899a6,
                orbitRadius: 7,
                orbitSpeed: 0.015,
                particleCount: 600,
                particleSize: 0.03,
                desc: '태양에 가장 가까운 행성으로 낮과 밤의 극단적인 온도 변화를 겪습니다. 작고 굳센 회백색 입자들의 띠로 시각화되었습니다.',
                stats: '반경: 7 AU | 공전 주기: 지구 기준 88일'
            },
            {
                name: '금성 (Venus)',
                radius: 0.9,
                color: 0xffaa44,
                orbitRadius: 10,
                orbitSpeed: 0.01,
                particleCount: 1000,
                particleSize: 0.035,
                desc: '지구와 덩치가 가장 비슷하지만 두꺼운 이산화탄소 대기층으로 인한 강력한 온실효과로 매우 뜨겁고 붉은 불지옥 행성입니다.',
                stats: '반경: 10 AU | 자전 주기: 243일 (역자전)'
            },
            {
                name: '지구 (Earth)',
                radius: 1.1,
                color: 0x00aaff,
                orbitRadius: 14,
                orbitSpeed: 0.007,
                particleCount: 1600,
                particleSize: 0.04,
                desc: '물과 산소, 생명체가 어우러져 살아가는 우주의 보석 같은 행성입니다. 짙푸른 태평양과 초록빛 육지 입자들의 흐름으로 연출되었습니다.',
                stats: '반경: 14 AU | 위성 수: 1개 (달)'
            },
            {
                name: '화성 (Mars)',
                radius: 0.8,
                color: 0xff3300,
                orbitRadius: 18,
                orbitSpeed: 0.005,
                particleCount: 900,
                particleSize: 0.035,
                desc: '산화철 토양으로 뒤덮여 붉은빛을 띠는 매혹적인 사막의 행성입니다. 얇은 대기와 과거 흐르던 강물의 흔적을 갖고 있습니다.',
                stats: '반경: 18 AU | 중력: 지구의 약 38%'
            },
            {
                name: '목성 (Jupiter)',
                radius: 2.2,
                color: 0xffd39b,
                orbitRadius: 24,
                orbitSpeed: 0.0025,
                particleCount: 3000,
                particleSize: 0.05,
                desc: '태양계 행성 중 가장 큰 가스성 거인입니다. 폭풍으로 일렁이는 베이지색과 적갈색 입자의 줄무늬 흐름이 신비롭게 휘돕니다.',
                stats: '반경: 24 AU | 공식 위성 수: 95개 이상'
            },
            {
                name: '토성 (Saturn)',
                radius: 1.8,
                color: 0xf4e2bb,
                orbitRadius: 31,
                orbitSpeed: 0.0012,
                particleCount: 2200,
                particleSize: 0.045,
                hasRings: true,
                ringInner: 2.4,
                ringOuter: 4.5,
                ringColor: 0xcca070,
                ringParticleCount: 3000,
                desc: '태양계에서 가장 우아하고 거대한 고리를 품고 있는 기체 행성입니다. 얼음과 우주 먼지 파티클 고리가 행성을 감싸 안고 돌고 있습니다.',
                stats: '반경: 31 AU | 고리 범위: 직경 약 282,000 km'
            }
        ];

        // 입자 구체(행성 몸체) 생성 헬퍼 함수
        function createSphereParticles(radius, particleCount, color, size) {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const origPos = [];
            const randomDirs = [];

            for (let i = 0; i < particleCount; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);

                const r = radius * (0.85 + Math.random() * 0.15);

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                origPos.push(x, y, z);
                randomDirs.push(
                    (Math.random() - 0.5) * 5.0,
                    (Math.random() - 0.5) * 5.0,
                    (Math.random() - 0.5) * 5.0
                );
            }

            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: color,
                size: size,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geo, mat);
            return { points, origPos, randomDirs };
        }

        // 토성 고리 입자 생성 헬퍼 함수
        function createRingParticles(innerRadius, outerRadius, particleCount, color, size) {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const origPos = [];
            const randomDirs = [];

            for (let i = 0; i < particleCount; i++) {
                const r = innerRadius + Math.random() * (outerRadius - innerRadius);
                const theta = Math.random() * Math.PI * 2;

                const x = Math.cos(theta) * r;
                const y = (Math.random() - 0.5) * 0.05;
                const z = Math.sin(theta) * r;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                origPos.push(x, y, z);
                randomDirs.push(
                    (Math.random() - 0.5) * 4.0,
                    (Math.random() - 0.5) * 4.0,
                    (Math.random() - 0.5) * 4.0
                );
            }

            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: color,
                size: size,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geo, mat);
            points.rotation.x = Math.PI / 2.5; // 고리 평면 기울이기
            return { points, origPos, randomDirs };
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 45; // 넓은 시야를 위해 카메라 배치 조정
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 전체 태양계 그룹 생성
            solarSystemGroup = new THREE.Group();
            scene.add(solarSystemGroup);

            // 1. 태양(Sun) 파티클 생성
            const sun = createSphereParticles(sunData.radius, sunData.particleCount, sunData.color, sunData.particleSize);
            solarSystemGroup.add(sun.points);
            sunObj = {
                points: sun.points,
                origPos: sun.origPos,
                randomDirs: sun.randomDirs,
                group: solarSystemGroup
            };

            // 2. 행성(Planets) & 궤도(Orbits) 생성
            planetsData.forEach(pData => {
                const planetGroup = new THREE.Group();
                solarSystemGroup.add(planetGroup);

                // 궤도 라인
                const orbitGeo = new THREE.BufferGeometry();
                const orbitPoints = [];
                for (let j = 0; j <= 64; j++) {
                    const theta = (j / 64) * Math.PI * 2;
                    orbitPoints.push(new THREE.Vector3(Math.cos(theta) * pData.orbitRadius, 0, Math.sin(theta) * pData.orbitRadius));
                }
                orbitGeo.setFromPoints(orbitPoints);
                const orbitMat = new THREE.LineBasicMaterial({
                    color: pData.color,
                    transparent: true,
                    opacity: 0.15
                });
                const orbit = new THREE.Line(orbitGeo, orbitMat);
                solarSystemGroup.add(orbit);

                // 행성 몸체
                const body = createSphereParticles(pData.radius, pData.particleCount, pData.color, pData.particleSize);
                planetGroup.add(body.points);

                // 고리(있는 경우 - 토성)
                let ring = null;
                if (pData.hasRings) {
                    ring = createRingParticles(pData.ringInner, pData.ringOuter, pData.ringParticleCount, pData.ringColor, 0.02);
                    planetGroup.add(ring.points);
                }

                planets.push({
                    name: pData.name,
                    desc: pData.desc,
                    stats: pData.stats,
                    group: planetGroup,
                    bodyPoints: body.points,
                    bodyOrigPos: body.origPos,
                    bodyRandomDirs: body.randomDirs,
                    ringPoints: ring ? ring.points : null,
                    ringOrigPos: ring ? ring.origPos : null,
                    ringRandomDirs: ring ? ring.randomDirs : null,
                    orbitRadius: pData.orbitRadius,
                    orbitSpeed: pData.orbitSpeed,
                    angle: Math.random() * Math.PI * 2
                });
            });

            // 3. 우주 배경 별빛(Stars)
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(5000 * 3);
            for (let i = 0; i < 5000 * 3; i++) {
                starPos[i] = (Math.random() - 0.5) * 800;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.35,
                transparent: true,
                opacity: 0.6
            });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // 4. 모션 트래킹 가이드 핸드 스케일
            handGroup = new THREE.Group();
            const skeletonGeo = new THREE.BufferGeometry();
            const skeletonMat = new THREE.LineBasicMaterial({
                color: 0x00ffaa,
                transparent: true,
                opacity: 0.6
            });
            handSkeleton = new THREE.LineSegments(skeletonGeo, skeletonMat);

            const pointsGeo = new THREE.BufferGeometry();
            const pointsMat = new THREE.PointsMaterial({
                color: 0x00ffff,
                size: 0.06
            });
            handPoints = new THREE.Points(pointsGeo, pointsMat);

            handGroup.add(handSkeleton);
            handGroup.add(handPoints);
            handGroup.position.set(0, 0, -10); // 카메라 앞 10단위 거리에 고정
            camera.add(handGroup);

            scene.add(new THREE.AmbientLight(0x222244, 1.5));
            animate();
        }

        function isHandFist(landmarks) {
            const tips = [8, 12, 16, 20];
            const joints = [6, 10, 14, 18];
            let closedCount = 0;
            for (let i = 0; i < 4; i++) {
                if (landmarks[tips[i]].y > landmarks[joints[i]].y) closedCount++;
            }
            return closedCount >= 3;
        }

        function updateExplosion() {
            if (!sunObj) return;

            const targetFactor = isExploded ? 12.0 : 0;
            explosionFactor = THREE.MathUtils.lerp(explosionFactor, targetFactor, isExploded ? 0.03 : 0.15);

            // 카메라 로컬에 마운트된 손바닥 중심의 월드 좌표 구하기
            let attractionVector = new THREE.Vector3();
            if (isExploded) {
                attractionVector.copy(currentHandCenter);
                handGroup.localToWorld(attractionVector);
            }

            // 1. 태양(Sun) 파티클 업데이트
            const sunAttr = sunObj.points.geometry.attributes.position;
            let localSunAttraction = attractionVector.clone();
            sunObj.group.worldToLocal(localSunAttraction);

            for (let i = 0; i < sunAttr.count; i++) {
                const i3 = i * 3;
                let x = sunObj.origPos[i3] + sunObj.randomDirs[i3] * explosionFactor;
                let y = sunObj.origPos[i3 + 1] + sunObj.randomDirs[i3 + 1] * explosionFactor;
                let z = sunObj.origPos[i3 + 2] + sunObj.randomDirs[i3 + 2] * explosionFactor;

                if (isExploded) {
                    x = THREE.MathUtils.lerp(x, localSunAttraction.x, 0.08);
                    y = THREE.MathUtils.lerp(y, localSunAttraction.y, 0.08);
                    z = THREE.MathUtils.lerp(z, localSunAttraction.z, 0.08);
                }

                sunAttr.array[i3] = x;
                sunAttr.array[i3 + 1] = y;
                sunAttr.array[i3 + 2] = z;
            }
            sunAttr.needsUpdate = true;

            // 2. 행성(Planets) & 고리(Rings) 파티클 업데이트
            planets.forEach(planet => {
                // 공전 궤도 위치 업데이트 (정지 상태가 아닐 때만 궤도 갱신)
                if (!isFrozen && !isExploded) {
                    planet.angle += planet.orbitSpeed;
                }

                const px = Math.cos(planet.angle) * planet.orbitRadius;
                const pz = Math.sin(planet.angle) * planet.orbitRadius;
                planet.group.position.set(px, 0, pz);

                if (!isFrozen) {
                    planet.group.rotation.y += 0.005; // 자전 효과
                }

                // 월드 좌표인 attractionVector를 행성 그룹 로컬 좌표계로 변환
                let localAttr = attractionVector.clone();
                planet.group.worldToLocal(localAttr);

                // 행성 몸체 입자 업데이트
                const bodyAttr = planet.bodyPoints.geometry.attributes.position;
                for (let i = 0; i < bodyAttr.count; i++) {
                    const i3 = i * 3;
                    let x = planet.bodyOrigPos[i3] + planet.bodyRandomDirs[i3] * explosionFactor;
                    let y = planet.bodyOrigPos[i3 + 1] + planet.bodyRandomDirs[i3 + 1] * explosionFactor;
                    let z = planet.bodyOrigPos[i3 + 2] + planet.bodyRandomDirs[i3 + 2] * explosionFactor;

                    if (isExploded) {
                        x = THREE.MathUtils.lerp(x, localAttr.x, 0.06);
                        y = THREE.MathUtils.lerp(y, localAttr.y, 0.06);
                        z = THREE.MathUtils.lerp(z, localAttr.z, 0.06);
                    }

                    bodyAttr.array[i3] = x;
                    bodyAttr.array[i3 + 1] = y;
                    bodyAttr.array[i3 + 2] = z;
                }
                bodyAttr.needsUpdate = true;

                // 행성 고리 입자 업데이트 (토성의 경우)
                if (planet.ringPoints) {
                    const ringAttr = planet.ringPoints.geometry.attributes.position;
                    for (let i = 0; i < ringAttr.count; i++) {
                        const i3 = i * 3;
                        let x = planet.ringOrigPos[i3] + planet.ringRandomDirs[i3] * explosionFactor;
                        let y = planet.ringOrigPos[i3 + 1] + planet.ringRandomDirs[i3 + 1] * explosionFactor;
                        let z = planet.ringOrigPos[i3 + 2] + planet.ringRandomDirs[i3 + 2] * explosionFactor;

                        if (isExploded) {
                            x = THREE.MathUtils.lerp(x, localAttr.x, 0.05);
                            y = THREE.MathUtils.lerp(y, localAttr.y, 0.05);
                            z = THREE.MathUtils.lerp(z, localAttr.z, 0.05);
                        }

                        ringAttr.array[i3] = x;
                        ringAttr.array[i3 + 1] = y;
                        ringAttr.array[i3 + 2] = z;
                    }
                    ringAttr.needsUpdate = true;
                }
            });

            // 화면 미세 흔들림 효과
            if (shakeIntensity > 0.02) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= 0.9;
            } else {
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, 0.1);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, 0.1);
            }
        }

        // 실시간 카메라와 행성 간의 거리 측정 및 자막 처리
        function checkNearbyPlanets() {
            let closestObject = null;
            let minDistance = Infinity;

            // 1. 태양과의 거리 구하기
            let sunWorldPos = new THREE.Vector3();
            solarSystemGroup.getWorldPosition(sunWorldPos); // 태양은 그룹 중심
            const sunDist = camera.position.distanceTo(sunWorldPos);
            if (sunDist < minDistance) {
                minDistance = sunDist;
                closestObject = {
                    name: sunData.displayName,
                    desc: sunData.desc,
                    stats: sunData.stats
                };
            }

            // 2. 각 행성과의 거리 구하기
            planets.forEach(planet => {
                let planetWorldPos = new THREE.Vector3();
                planet.group.getWorldPosition(planetWorldPos);
                const dist = camera.position.distanceTo(planetWorldPos);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestObject = {
                        name: planet.name,
                        desc: planet.desc,
                        stats: planet.stats
                    };
                }
            });

            // 3. 거리 임계값 이내로 다가갔을 때 자막창 활성화 (임계값: 27.5 단위)
            const panel = document.getElementById('planet-info-panel');
            const threshold = 27.5;

            if (minDistance < threshold && closestObject) {
                document.getElementById('info-planet-name').innerText = closestObject.name;
                document.getElementById('info-planet-desc').innerText = closestObject.desc;
                document.getElementById('info-planet-stats').innerText = closestObject.stats;
                panel.classList.add('visible');
            } else {
                panel.classList.remove('visible');
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updateExplosion();
            checkNearbyPlanets(); // 행성 접근 실시간 탐색

            // 상시 태양 자전 및 약간의 은하 흔들림
            if (solarSystemGroup) {
                solarSystemGroup.children[0].rotation.y += 0.001; // 태양 자전
                if (!isExploded && !lastHandPos) {
                    // 손 움직임 없을 때 자동 회전
                    solarSystemGroup.rotation.y += 0.001;
                }
            }

            if (stars) {
                stars.rotation.y += 0.0001;
            }

            renderer.render(scene, camera);
        }

        async function startApp() {
            initThree();

            const videoElement = document.getElementById('input-video');
            const loadingMsg = document.getElementById('loading-msg');

            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            // Hands 트래킹 최적화
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            const handConnections = [
                [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
                [0, 9], [9, 10], [10, 11], [11, 12], [0, 13], [13, 14], [14, 15], [15, 16],
                [0, 17], [17, 18], [18, 19], [19, 20], [5, 9], [9, 13], [13, 17]
            ];

            hands.onResults((results) => {
                if (loadingMsg) loadingMsg.style.display = 'none';

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const positions = [];
                    const linePositions = [];

                    // 손 중심 계산 (손바닥 중심점 9번 뼈 마디 사용)
                    currentHandCenter.set(
                        ((1 - landmarks[9].x) - 0.5) * 15,
                        -(landmarks[9].y - 0.5) * 10,
                        0
                    );

                    landmarks.forEach(lm => {
                        const x = ((1 - lm.x) - 0.5) * 15;
                        const y = -(lm.y - 0.5) * 10;
                        const z = 0;
                        positions.push(x, y, z);
                    });

                    handConnections.forEach(([start, end]) => {
                        linePositions.push(positions[start * 3], positions[start * 3 + 1], positions[start * 3 + 2]);
                        linePositions.push(positions[end * 3], positions[end * 3 + 1], positions[end * 3 + 2]);
                    });

                    if (handPoints) handPoints.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    if (handSkeleton) handSkeleton.geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

                    const isFist = isHandFist(landmarks);
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];

                    // 1. 줌인 / 줌아웃 (손가락 벌리기)
                    const zoomDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                    const targetZ = 75 - (zoomDist * 180);
                    camera.position.z = THREE.MathUtils.lerp(camera.position.z, Math.max(15, Math.min(targetZ, 95)), 0.1);

                    // 2. 주먹 제스처에 따른 공전 멈춤 및 수동 회전
                    if (isFist) {
                        isExploded = false;
                        isFrozen = true; // 태양계 공전 멈춤

                        if (lastHandPos) {
                            // 주먹 이동 거리에 따른 3D 뷰 회전
                            const dx = (1 - indexTip.x) - (1 - lastHandPos.x);
                            const dy = indexTip.y - lastHandPos.y;
                            solarSystemGroup.rotation.y += dx * 5;
                            solarSystemGroup.rotation.x += dy * 5;
                        }
                        lastHandPos = indexTip;
                    } else {
                        // 손을 폈을 때: 공전 멈추고 입자 대폭발 유도
                        isExploded = true;
                        isFrozen = false;
                        lastHandPos = null;
                    }
                    if (handGroup) handGroup.visible = true;
                } else {
                    // 손 감지되지 않을 때는 정상 작동(공전 진행, 회전은 고정)
                    if (handGroup) handGroup.visible = false;
                    lastHandPos = null;
                    isExploded = false;
                    isFrozen = false;
                }
            });

            if (typeof Camera !== 'undefined') {
                const cameraProvider = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 640, height: 480
                });
                cameraProvider.start();
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    videoElement.srcObject = stream;
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        const processFrame = async () => {
                            await hands.send({ image: videoElement });
                            requestAnimationFrame(processFrame);
                        };
                        processFrame();
                    };
                } catch (err) {
                    if (loadingMsg) loadingMsg.innerText = "에러: 카메라 장치를 찾을 수 없거나 권한이 거부되었습니다.";
                }
            }
        }

        window.onload = startApp;

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
